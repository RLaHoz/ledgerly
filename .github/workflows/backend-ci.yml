name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/**"
      - "AGENTS.md"
      - "DECISIONS.md"
      - "skills/**"
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - ".github/**"
      - "AGENTS.md"
      - "DECISIONS.md"
      - "skills/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
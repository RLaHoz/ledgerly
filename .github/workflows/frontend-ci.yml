name: Frontend CI

on:
  pull_request:
    branches: [ main, dev ]
    paths:
      - "frontend/**"
      - ".github/**"
      - "AGENTS.md"
      - "DECISIONS.md"
      - "skills/**"
  push:
    branches: [ main, dev ]
    paths:
      - "frontend/**"
      - ".github/**"
      - "AGENTS.md"
      - "DECISIONS.md"
      - "skills/**"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          lfs: false

      - name: Debug workspace (temporary)
        run: |
          echo "ROOT:"
          pwd
          echo "LIST ROOT:"
          ls -la ..
          echo "LIST FRONTEND:"
          ls -la .
          echo "LOCKFILE:"
          ls -la package-lock.json
        working-directory: frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
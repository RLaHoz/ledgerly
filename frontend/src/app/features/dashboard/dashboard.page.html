<ion-content [fullscreen]="true">
  <section class="home-layout-page">
    <app-budget-health
      [monthLabel]="monthLabel()"
      [monthValue]="selectedMonthDate()"
      [minMonthDate]="minMonthDate"
      [maxMonthDate]="maxMonthDate"
      [healthLabel]="budgetHealthLabel"
      [updatedLabel]="updatedLabel"
      [trendLabel]="trendLabel"
      [stats]="budgetHealthStats"
      (previousRequested)="onPreviousMonth()"
      (nextRequested)="onNextMonth()"
      (monthSelected)="onMonthSelected($event)"
    />

    <app-main-budget-info [model]="mainBudgetInfo()" />

    <app-safe-place-alerts [model]="safePlaceAlerts" />

    <app-priority [items]="priorityItems" />

    <app-budget-pressure
      [items]="budgetPressureItems"
      [editable]="false"
      (viewAllRequested)="onBudgetPressureViewAll()"
      (itemAction)="onBudgetPressureItemAction($event)"
    />
  </section>
</ion-content>

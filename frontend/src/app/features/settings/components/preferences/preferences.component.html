<article class="preferences-card" aria-label="Preferences">
  <header class="card-header">
    <h2>{{ model().title }}</h2>
  </header>

  <section class="rows">
    <article class="row">
      <div class="row-main">
        <span class="row-icon" aria-hidden="true">
          <ion-icon name="globe-outline"></ion-icon>
        </span>

        <div class="row-copy">
          <h3>Currency</h3>
          <p>Display currency</p>
        </div>
      </div>

      <ion-select
        class="row-select"
        [value]="model().currencyValue"
        interface="popover"
        aria-label="Currency"
        (ionChange)="onCurrencyChange($event)"
      >
        @for (option of model().currencyOptions; track option) {
          <ion-select-option [value]="option">{{ option }}</ion-select-option>
        }
      </ion-select>
    </article>

    <article class="row">
      <div class="row-main">
        <span class="row-icon" aria-hidden="true">
          <ion-icon name="calendar-outline"></ion-icon>
        </span>

        <div class="row-copy">
          <h3>Month Start</h3>
          <p>Budget cycle day</p>
        </div>
      </div>

      <ion-select
        class="row-select"
        [value]="model().monthStartValue"
        interface="popover"
        aria-label="Month start"
        (ionChange)="onMonthStartChange($event)"
      >
        @for (option of model().monthStartOptions; track option) {
          <ion-select-option [value]="option">{{ option }}</ion-select-option>
        }
      </ion-select>
    </article>

    <article class="row" [class.is-off]="!model().familyModeEnabled">
      <div class="row-main">
        <span class="row-icon" aria-hidden="true">
          <ion-icon name="people-outline"></ion-icon>
        </span>

        <div class="row-copy">
          <h3>Family Mode</h3>
          <p>Share with partner</p>
        </div>
      </div>

      <button
        type="button"
        class="switch"
        [class.is-on]="model().familyModeEnabled"
        aria-label="Family mode"
        [attr.aria-pressed]="model().familyModeEnabled"
        (click)="onFamilyModeToggle()"
      >
        <span class="switch-handle"></span>
      </button>
    </article>

    <article class="row">
      <div class="row-main">
        <span class="row-icon" aria-hidden="true">
          <ion-icon name="sunny-outline"></ion-icon>
        </span>

        <div class="row-copy">
          <h3>Theme</h3>
          <p>Appearance</p>
        </div>
      </div>

      <div class="theme-segment" role="group" aria-label="Theme mode">
        <button
          type="button"
          class="theme-option"
          [class.is-active]="isThemeActive('light')"
          (click)="themeModeChanged.emit('light')"
        >
          <ion-icon name="sunny-outline"></ion-icon>
          <span>Light</span>
        </button>

        <button
          type="button"
          class="theme-option"
          [class.is-active]="isThemeActive('dark')"
          (click)="themeModeChanged.emit('dark')"
        >
          <ion-icon name="moon-outline"></ion-icon>
          <span>Dark</span>
        </button>

        <button
          type="button"
          class="theme-option"
          [class.is-active]="isThemeActive('auto')"
          (click)="themeModeChanged.emit('auto')"
        >
          <ion-icon name="desktop-outline"></ion-icon>
          <span>Auto</span>
        </button>
      </div>
    </article>
  </section>
</article>

<article class="partner-card">
  <div class="partner-avatar">{{ partner().initials }}</div>

  <div class="partner-copy">
    <div class="partner-name-line">
      <h3>{{ partner().fullName }}</h3>
      <span class="partner-status">{{ partner().statusLabel }}</span>
    </div>

    <p>{{ partner().email }}</p>
  </div>
</article>
